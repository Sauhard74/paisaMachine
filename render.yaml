services:
  - type: web
    name: paisamachine-backend
    runtime: node
    rootDir: backend
    buildCommand: npm ci && npm run build
    startCommand: node dist/index.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://paisamachine-frontend.onrender.com
      - key: TWITTER_BEARER_TOKEN
        sync: false

  - type: web
    name: paisamachine-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_BACKEND_URL
        value: https://paisamachine-backend.onrender.com
